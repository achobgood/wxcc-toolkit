# wxcc-flow generator overrides — every deviation from the Flow Store spec.
# NEVER hand-edit emitted files. A generated command that needs a tweak means a
# new entry here (design § 6). The generator lint FAILS if any tag/operationId
# below is absent from specs/flow-store-api-docs.json.
#
# Spec inventory (verified 2026-07-12): 91 ops / 64 paths / 17 tags.
# Coverage math: 91 = 55 generated + 1 blocked-stub + 22 skip_endpoints
#                   + 13 skip_tags (admin-flow-controller 12 + prometheus 1).
# The 2 json-patch ops the spec declares (patchProject, mergePatchFlow) are both
# skipped/blocked, so the wxcli JSON-Patch auto-detection was safely dropped.

# ── tag → group mapping (design § 5). Multiple source tags may fold into one
#    group; the util group merges four singleton controllers. ────────────────
groups:
  flows: ["Flow", "Flow APIs"]          # Flow APIs = 2 ops already double-tagged onto Flow
  flows-v2: ["Flow V2"]
  versions: ["flow-version-controller"]
  tracing: ["Flow Tracing APIs"]
  prefs: ["flow-property-controller"]
  templates: ["Flow Template APIs"]
  resource-collections: ["Flow Resource Collection APIs"]
  connectors: ["connector-controller"]
  projects: ["project-controller"]
  user-prefs: ["User Preferences"]
  util: ["expression-test-controller", "buid-info-controller", "health-controller", "auth-controller"]

auto_inject_from_config: ["orgId", "projectId"]

# ── tag-level skips (13 ops): admin RBAC (403 verified) + Prometheus scrape ──
skip_tags:
  - "admin-flow-controller"   # 12 internal admin ops — 403 RBAC verified live
  - "prometheus-controller"   # /metrics Prometheus scrape

# ── op-level skips (22 ops) — the Tier-3 list minus the 13 tag-skips. ────────
skip_endpoints:
  auth: "GET /auth — browser-login redirect helper; getCurrentUser (whoami) generates instead"
  createTemplate: "shared-catalog mutation — creating templates affects every org user"
  updateTemplate: "shared-catalog mutation"
  deleteFlowTemplate: "shared-catalog mutation"
  createProject: "destructive on the system-provisioned project entity"
  updateProject: "destructive on the system-provisioned project entity"
  deleteProject: "destructive on the system-provisioned project entity"
  patchProject: "destructive on the system-provisioned project entity (json-patch)"
  saveConnector: "Control-Hub-managed; risks breaking live integrations"
  updateConnector: "Control-Hub-managed; risks breaking live integrations"
  deleteConnector: "Control-Hub-managed; risks breaking live integrations"
  saveFlow: "requires generating proprietary v1 Flow JSON (repo hard rule)"
  updateFlowById: "requires generating proprietary v1 Flow JSON (repo hard rule)"
  getOrCreateDraft: "v1 draft shape — v2 getDraft covers it"
  saveDraft_1: "v1 draft shape — v2 saveDraft covers it"
  exportFlowVersion_2: "trailing-slash duplicate of exportFlowVersion_1"
  copyFlow_1: "trailing-slash duplicate of copyFlow"
  removeRoutingStrategyFromFlow: "destructive routing-strategy detach"
  searchFlows: "exact/case-sensitive only; the list command uses partialNameSearch"
  createUserPreferences: "clobbers Flow Designer UI state"
  updateUserPreferences: "clobbers Flow Designer UI state"
  deleteUserPreferences: "clobbers Flow Designer UI state"

# ── blocked → refusing stub (exit 2, shown in --help). ──────────────────────
blocked_endpoints:
  mergePatchFlow: "mergePatchFlow is a verified silent no-op for name/description (200, only lastModifiedDate changes). Use: wxcc-flow update  (or: wxcc-flow api flows-v2 patch-draft)"

# ── warn → real command + stderr banner before the call. ────────────────────
warn_endpoints:
  findAllLatestFlowVersions: "500s org-wide when never-published flows exist; fall back to 'api versions all'"
  dryRunValidate: "always validates as FLOW (no flowType param); a valid SUBFLOW fails with ACTIVITY_NOT_FOUND on end-subflow"
  validateFlowVersionById: "always validates as FLOW (no flowType param); a valid SUBFLOW fails with ACTIVITY_NOT_FOUND on end-subflow"
  patchDraft: "500s on consume-template-created drafts; patch FlowIR-authored flows only"
  consumeFlowFromTemplate: "SUBFLOW templates 404 (feature-flag 'flow-control-draft-templates' gated)"

# ── multipart (design § 2): v1 import — the contract mislabels a binary file
#    part as application/json; a raw JSON body 500s. ──────────────────────────
request_overrides:
  importFlowVersion_1:
    multipart: true

# ── global flag renames (applied to EVERY op; a per-op param_cli_names entry
#    wins on a conflicting wire name). Preserves the documented `--type` flag
#    (CLAUDE.md ships `--type SUBFLOW` on ~16 commands) instead of the derived
#    `--flow-type`, and gives the v1 spaced param "Flow Type" the same flag. ──
global_param_cli_names:
  flowType: "type"
  "Flow Type": "type"

# ── page-number pagination — fetch ALL pages by default; --page/--size fetch a
#    single page (design § 6, capability 6). item_key = response array wrapper. ─
pagination:
  findFlows: {page_param: page, size_param: size, item_key: flows}
  getPublishedFlowVersions: {page_param: page, size_param: size, item_key: versions}
  getAllFlowVersions: {page_param: page, size_param: size, item_key: versions}
  findAll_1: {page_param: page, size_param: size, item_key: templates}
  findAll: {page_param: page, size_param: size, item_key: projects}
  getInteractions: {page_param: currentPage, size_param: pageSize, item_key: interactions}

# ── item_key for non-paginated list commands rendered with a table. ─────────
response_list_keys:
  findAllConnectors: connectors

# ── table columns (also marks the command as a list). Columns use only field
#    accessors verified live in Phase A (api sweep) or Phase 3 (hand commands). ─
table_columns:
  findFlows: [["ID", "id"], ["Name", "name"], ["Type", "flowType"], ["Status", "status"]]
  # Version ID (ObjectId) MUST lead — it is what `revert FLOW VERSION` / `version get`
  # consume; dropping it from the default table breaks the find-then-revert workflow.
  getPublishedFlowVersions: [["Version ID", "id"], ["Version", "version"], ["Tag", "tag"], ["Published", "publishedDate"], ["Created By", "createdBy"]]
  getAllFlowVersions: [["Flow", "flowId"], ["Version", "version"], ["Tag", "tag"]]
  findAll_1: [["ID", "id"], ["Name", "name"], ["Type", "flowType"], ["Description", "description"]]
  findAll: [["ID", "id"], ["Name", "name"], ["Default", "default"], ["Created By", "createdBy"]]
  findAllConnectors: [["ID", "id"], ["Name", "name"], ["Type", "type"]]
  getInteractions: [["Interaction ID", "interactionId"], ["Version", "flowVersionId"], ["ANI", "ani"], ["DNIS", "dnis"], ["Start", "startTime"], ["End", "endTime"]]

# ── success_echo (Phase-B polish): these ops return an EMPTY body, so a raw
#    print_json prints a bare `null`. Print the friendly confirmation instead
#    (the body is still printed if the server ever returns one). Placeholders
#    reference the emitted argument names. ──────────────────────────────────────
success_echo:
  lockFlow: "Locked flow {flow_id}"
  unlockFlow: "Unlocked flow {flow_id}"
  removeFlowById: "Deleted flow {flow_id}"
  revertFlowVersion: "Reverted flow {flow_id} to version {version_id}"

# ── promote_to_argument (Phase-B polish): the verb's SUBJECT reads better as a
#    positional argument than behind a required flag — `revert FLOW VERSION`,
#    `copy SOURCE`, `variable-mapping CURRENT HANDOFF`. Still sent as query
#    params on the wire. ────────────────────────────────────────────────────────
promote_to_argument:
  copyFlow: ["sourceFlowId"]
  revertFlowVersion: ["versionId"]
  performFlowVariableAutoMapping: ["currentFlowId", "handOffFlowId"]

# ── expose_path_param (Phase-B polish): the connector-controller 404s on the
#    system-provisioned project, so the auto-injected projectId must be
#    overridable — `connector-list --project-id <user-project>`. ────────────────
expose_path_param:
  findAllConnectors: ["projectId"]
  getConnector: ["projectId"]
  # restore the hand `project [ID]` capability (query any project, not just the
  # configured one) as an overridable --project-id.
  findProject: ["projectId"]

# ── curated command names, keyed by operationId (stable — unlike derived names).
#    Every generated op gets an explicit, unique-within-group name. ───────────
command_names:
  # flows
  findFlowById: get
  findFlows: list
  performFlowVariableAutoMapping: variable-mapping
  checkFlowNameUniqueness: unique-name
  importFlowVersion_1: import
  copyFlow: copy
  consumeFlowFromJson: consume
  consumeFlowFromTemplate: consume-template
  unlockFlow: unlock
  revertFlowVersion: revert
  publishFlowVersion: publish
  lockFlow: lock
  findFlows_1: check
  exportFlowVersion_1: export
  getGlobalVariables: global-variables
  removeFlowById: delete
  mergePatchFlow: merge-patch
  # flows-v2
  dryRunValidate: validate
  importFlowVersion: import
  getDraft: get-draft
  saveDraft: save-draft
  patchDraft: patch-draft
  validateFlowVersionById: validate-id
  exportFlowVersion: export
  getActivityDefinitions: activities
  describeActivity: describe
  getChoicesForInput: choices
  # versions
  getPublishedFlowVersions: list
  getFlowVersionById: get
  getLatestFlowVersion: latest
  getLatestFlowDraftVersion: draft
  getAllFlowVersions: all
  findAllLatestFlowVersions: all-latest
  # tracing
  getInteraction: interaction
  getTraces: traces
  getTracesDecrypt: traces-decrypt
  getAnalytics: analytics
  getInteractions: interactions
  # prefs
  getFlowPreferences: list
  createFlowPreference: add
  updateFlowPreferences: set
  removeFlowPreferencesByPreferenceNames: remove
  getFlowTags: tags
  getTagHistories: tag-history
  # templates
  findById: get
  findAll_1: list
  # resource-collections
  getResourceCollectionsByUserProfile: list
  # connectors
  getConnector: get
  findAllConnectors: list
  # projects
  findProject: get
  findAll: list
  # user-prefs
  getUserPreferences: get
  # util
  testExpression: test-expr
  buildInfo: build-info
  health: health
  getCurrentUser: whoami

# ── top-level promotions (design § 5) — Phase B wave 1. Each generated command
#    is ALSO registered at the root app under its documented porcelain name; the
#    hand-written command of that name MUST be deleted (register() raises on a
#    live collision). Key = operationId, value = root command name. ────────────
top_level_commands:
  # Group 1 — read-only, print_json, output already identical to hand
  findFlowById: get
  getFlowPreferences: prefs
  getFlowTags: tags
  getTagHistories: tag-history
  getUserPreferences: user-prefs
  getResourceCollectionsByUserProfile: resource-collections
  # NOTE: `health` intentionally NOT promoted — the hand command bundles /health
  # AND /build_info (2 calls); the generated single-op `util health` drops
  # build-info. Deferred to Phase C (split health + build-info, or keep the bundle).
  getInteraction: interaction
  getAnalytics: analytics
  findProject: project
  # Group 2 — read-only lists with curated domain columns
  getPublishedFlowVersions: versions
  findAll_1: templates
  findAll: projects
  getInteractions: interactions
  # Group 3 — mutations (success_echo / promote_to_argument polish applied)
  lockFlow: lock
  unlockFlow: unlock
  removeFlowById: delete
  copyFlow: copy
  revertFlowVersion: revert
  performFlowVariableAutoMapping: variable-mapping
  # Connectors — with the --project-id override so they can reach a user project
  findAllConnectors: connector-list
  getConnector: connector

# ── drift-gate excuse list: the 7 irreducible hand-written commands (design
#    § 14) have no spec operation; the parity gate counts them as excused. ────
keep_endpoints:
  - "configure"     # local: save token + auto-resolve org
  - "set-project"   # local: set project id
  - "init"          # local: materialize bundled playbook
  - "template"      # local: bundled FlowIR starter template
  - "events"        # synthesis: mines eventsGenerated from the start activity (no event-spec endpoint)
  - "connectors"    # synthesis: aggregates two choices calls (connector-controller 404s on system project)
  - "schema"        # synthesis: builds a FlowIR node template client-side (no endpoint returns this)
