# wxcc-flow generator overrides — every deviation from the Flow Store spec.
# NEVER hand-edit emitted files. A generated command that needs a tweak means a
# new entry here (design § 6). The generator lint FAILS if any tag/operationId
# below is absent from specs/flow-store-api-docs.json.
#
# Spec inventory (verified 2026-07-12): 91 ops / 64 paths / 17 tags.
# Coverage math: 91 = 55 generated + 1 blocked-stub + 22 skip_endpoints
#                   + 13 skip_tags (admin-flow-controller 12 + prometheus 1).
# The 2 json-patch ops the spec declares (patchProject, mergePatchFlow) are both
# skipped/blocked, so the wxcli JSON-Patch auto-detection was safely dropped.

# ── tag → group mapping (design § 5). Multiple source tags may fold into one
#    group; the util group merges four singleton controllers. ────────────────
groups:
  flows: ["Flow", "Flow APIs"]          # Flow APIs = 2 ops already double-tagged onto Flow
  flows-v2: ["Flow V2"]
  versions: ["flow-version-controller"]
  tracing: ["Flow Tracing APIs"]
  prefs: ["flow-property-controller"]
  templates: ["Flow Template APIs"]
  resource-collections: ["Flow Resource Collection APIs"]
  connectors: ["connector-controller"]
  projects: ["project-controller"]
  user-prefs: ["User Preferences"]
  util: ["expression-test-controller", "buid-info-controller", "health-controller", "auth-controller"]

auto_inject_from_config: ["orgId", "projectId"]

# ── tag-level skips (13 ops): admin RBAC (403 verified) + Prometheus scrape ──
skip_tags:
  - "admin-flow-controller"   # 12 internal admin ops — 403 RBAC verified live
  - "prometheus-controller"   # /metrics Prometheus scrape

# ── op-level skips (22 ops) — the Tier-3 list minus the 13 tag-skips. ────────
skip_endpoints:
  auth: "GET /auth — browser-login redirect helper; getCurrentUser (whoami) generates instead"
  createTemplate: "shared-catalog mutation — creating templates affects every org user"
  updateTemplate: "shared-catalog mutation"
  deleteFlowTemplate: "shared-catalog mutation"
  createProject: "destructive on the system-provisioned project entity"
  updateProject: "destructive on the system-provisioned project entity"
  deleteProject: "destructive on the system-provisioned project entity"
  patchProject: "destructive on the system-provisioned project entity (json-patch)"
  saveConnector: "Control-Hub-managed; risks breaking live integrations"
  updateConnector: "Control-Hub-managed; risks breaking live integrations"
  deleteConnector: "Control-Hub-managed; risks breaking live integrations"
  saveFlow: "requires generating proprietary v1 Flow JSON (repo hard rule)"
  updateFlowById: "requires generating proprietary v1 Flow JSON (repo hard rule)"
  getOrCreateDraft: "v1 draft shape — v2 getDraft covers it"
  saveDraft_1: "v1 draft shape — v2 saveDraft covers it"
  exportFlowVersion_2: "trailing-slash duplicate of exportFlowVersion_1"
  copyFlow_1: "trailing-slash duplicate of copyFlow"
  removeRoutingStrategyFromFlow: "destructive routing-strategy detach"
  searchFlows: "exact/case-sensitive only; the list command uses partialNameSearch"
  createUserPreferences: "clobbers Flow Designer UI state"
  updateUserPreferences: "clobbers Flow Designer UI state"
  deleteUserPreferences: "clobbers Flow Designer UI state"

# ── blocked → refusing stub (exit 2, shown in --help). ──────────────────────
blocked_endpoints:
  mergePatchFlow: "mergePatchFlow is a verified silent no-op for name/description (200, only lastModifiedDate changes). Use: wxcc-flow update  (or: wxcc-flow api flows-v2 patch-draft)"

# ── warn → real command + stderr banner before the call. ────────────────────
warn_endpoints:
  findAllLatestFlowVersions: "500s org-wide when never-published flows exist; fall back to paged 'wxcc-flow all-versions'"
  dryRunValidate: "always validates as FLOW (no flowType param); a valid SUBFLOW fails with ACTIVITY_NOT_FOUND on end-subflow"
  validateFlowVersionById: "always validates as FLOW (no flowType param); a valid SUBFLOW fails with ACTIVITY_NOT_FOUND on end-subflow"
  patchDraft: "500s on consume-template-created drafts; patch FlowIR-authored flows only"
  consumeFlowFromTemplate: "SUBFLOW templates 404 (feature-flag 'flow-control-draft-templates' gated)"

# ── multipart (design § 2): v1 import — the contract mislabels a binary file
#    part as application/json; a raw JSON body 500s. ──────────────────────────
request_overrides:
  importFlowVersion_1:
    multipart: true

# ── per-op flag renames (Phase C): keep the DOCUMENTED flags (CLAUDE.md ships
#    `choices ... --parent-input X --parent-value Y` and `traces ... --page N`);
#    the spec wire names would derive --parent-input-name / --current-page. ────
param_cli_names:
  getChoicesForInput: {parentInputName: parent-input}
  getTraces: {currentPage: page}

# ── file input (Phase C): the command's positional FILE (or '-' for stdin)
#    becomes the JSON request body. ──────────────────────────────────────────
body_from_file:
  importFlowVersion: true          # create FILE
  saveDraft: true                  # save-draft FLOW FILE
  patchDraft: true                 # patch FLOW FILE
  updateFlowPreferences: true      # prefs-set FLOW FILE
  createFlowPreference: true       # prefs-add FLOW FILE
  consumeFlowFromJson: true        # consume FILE (+ body_transform below)
  dryRunValidate: true             # validate FILE (design § 14 split)

# ── consume: the contract wants the request body to be a JSON *string*
#    containing the flow JSON (double-encoded) — verified live Phase 3. ───────
body_transform:
  consumeFlowFromJson: json-string

# ── file output (Phase C): adds `--out FILE` (write response JSON to a file).
#    NOTE the hand commands used `-o` for the file; generated keeps -o/--output
#    for FORMAT and uses --out for the file (goldens README reconciliation). ──
output_file_option:
  getDraft: true                   # draft
  exportFlowVersion: true          # export (v2)
  exportFlowVersion_1: true        # export-ui (v1, incl. UI diagram data)
  findById: true                   # template-get
  # the old `version FLOW [ref]` multiplexer had --out; its three split
  # replacements keep it (audit F2)
  getLatestFlowVersion: true       # version-latest
  getLatestFlowDraftVersion: true  # version-draft
  getFlowVersionById: true         # version-by-id

# ── auto_resolve_params (Phase C): when the flag is omitted, pre-fetch the
#    op's own path (GET = the current draft) and read `flow.version` into
#    expectedVersion — optimistic-lock parity with the hand commands. ─────────
auto_resolve_params:
  saveDraft:
    expectedVersion: {unwrap: flow, field: version, forward_params: [flowType]}
  patchDraft:
    expectedVersion: {unwrap: flow, field: version, forward_params: [flowType]}

# ── param_defaults (Phase C): seed a query param where the DOCUMENTED CLI
#    default differs from the API default. setdefault after the query build —
#    an explicit flag always wins. ─────────────────────────────────────────────
param_defaults:
  # export: historical CLI behavior exports the DRAFT; the API default is
  # 'latest' (most recent published). CLAUDE.md documents the draft default.
  exportFlowVersion: {version: draft}
  # publish: hand command skips publish-time validation by default (the CLI
  # workflow validates explicitly beforehand; publish-time validation can
  # false-positive, e.g. FC1015 on hand-off flows). API default validates.
  publishFlowVersion: {skipValidation: "true"}

# ── publish --validate: inverted bool flag over the skipValidation wire param
#    (--validate → skipValidation=false). ─────────────────────────────────────
param_flag_inversions:
  publishFlowVersion:
    skipValidation: {cli_name: validate, invert: true}
  # check --with-drafts: bool flag whose WIRE values are yes/no — the server
  # accepts "true" without a 400 but silently treats it as the default "no"
  # (audit F1; hand code sent "yes").
  findFlows_1:
    withDraftVersions: {cli_name: with-drafts, true_value: "yes", false_value: "no"}

# ── unique-name: exit 1 when the name is taken (isUnique=false; key verified
#    live 2026-07-12 — the server 200s with {"isUnique": bool}). ──────────────
exit_code_from:
  checkFlowNameUniqueness: {json_key: isUnique, invert: true}

# ── test-expr: ExpressionTestRequest is an EMPTY schema in the contract; the
#    real body field is `expr` (verified via raw curl 2026-07-11). ────────────
body_fields_override:
  testExpression:
    - {name: expr, type: str, desc: "Flow expression to test", required: true}

# ── prefs-rm: the DELETE body is a JSON array of preference names — one
#    positional list arg (kills the spec-junk --empty/--traversable-again). ───
body_positional_list:
  removeFlowPreferencesByPreferenceNames: {arg: names, help: "Preference names to remove"}

confirm_message:
  removeFlowPreferencesByPreferenceNames: "Remove preferences {', '.join(names)} from flow {flow_id}?"

# ── extra_commands (Phase C): clone one op into additional commands. The clone
#    inherits the base op's RESOLVED overrides; the `overrides` block here uses
#    RESOLVED key names (warn/item_key/command_type/...) and a null/false value
#    clears an inherited key. `top_level` promotes the clone to the root app. ──
extra_commands:
  findFlows:
    - name: search
      top_level: search
      doc: "Search flows by name (case-insensitive substring match)"
      overrides:
        promote_to_argument: [partialNameSearch]
  patchDraft:
    - name: update
      top_level: update
      doc: "Rename / re-describe a flow (applies to the draft; publish to propagate)"
      overrides:
        body_from_file: false          # clear the base patch's FILE argument
        warn: null                     # clear the consume-template-draft warn banner
        require_some_body: true        # refuse an empty patch
        body_fields_override:
          - {name: name, type: str, desc: "New flow name"}
          - {name: description, type: str, desc: "New flow description"}
        success_echo: "Updated draft of flow {flow_id} (publish to propagate to the flow level)"

# ── help_notes (Phase C) ──────────────────────────────────────────────────────
help_notes:
  getTracesDecrypt: "Returns DECRYPTED traces; --process-id is required (get it from the undecrypted traces or the interaction metadata)."
  findFlows_1: "Provide at least one filter (--global-var, --ep-id, --skill-id, --business-hour, --search, --flow-id) — the server rejects unfiltered calls (400 'No search parameter provided')."
  exportFlowVersion: "--version defaults to 'draft' (historical CLI behavior; 'latest' = most recent published, or pass a version ID)."
  publishFlowVersion: "Publish-time validation is OFF by default (validate explicitly with 'wxcc-flow validate'); add --validate to validate at publish time."

# ── param_help (Phase D2): per-flag help backfill for spec params that ship NO
#    description (opId → wire param name → text). Precedence: per-op param_help
#    > spec description/enum choices > global_param_help. Wording sources: the
#    deleted hand commands' live-verified help (git fbbe1cb/7798e35), CLAUDE.md
#    CLI docs, and the spec's own schema defaults — nothing invented. ──────────
param_help:
  findFlowById:
    view: "Response view (server default: basic)"
  removeFlowById:
    force: "Sets the server's `force` query param (spec default: no)"
    skipRsEPCheck: "Sets the `skipRsEPCheck` query param — routing-strategy / entry-point usage check (server default: true)"
  performFlowVariableAutoMapping:
    handOffTagId: "Hand-off tag ID"
    handOffVariableSource: "Hand-off variable source"
  checkFlowNameUniqueness:
    flowId: "Exclude this flow ID (for renames)"
  importFlowVersion_1:
    associatedRcs: "Sets the `associatedRcs` query param (associated resource collections)"
  copyFlow:
    associatedRcs: "Sets the `associatedRcs` query param (associated resource collections)"
  findFlows_1:
    view: "Response view (server default: basic)"
    skillId: "Find flows using this skill ID"
    epId: "Find flows attached to this entry point ID"
    flowId: "Restrict to one flow ID"
    globalVar: "Find flows using this global variable"
    search: "Search term"
    businessHour: "Find flows using this business-hours entity"
    flowType: "FLOW, SUBFLOW, or ALL (server default: ALL)"
  getGlobalVariables:
    search: "Filter by name"
    validate: "Sets the `validate` query param"
  getPublishedFlowVersions:
    sort: "Sets the `sort` query param (sort order)"
  getAllFlowVersions:
    searchBy: "Filter (sets the `searchBy` query param)"
    sort: "Sets the `sort` query param (sort order)"

# ── global_param_help (Phase D2): applied to EVERY op, but only fills params
#    whose spec description is EMPTY — real spec text always wins. (Unlike it,
#    per-op param_help above may override anything.) flowType default verified
#    per-op in the spec: FLOW everywhere it applies; findFlows_1 (default ALL)
#    carries its own param_help entry. ──────────────────────────────────────────
global_param_help:
  flowType: "FLOW or SUBFLOW (server default: FLOW)"

# ── global flag renames (applied to EVERY op; a per-op param_cli_names entry
#    wins on a conflicting wire name). Preserves the documented `--type` flag
#    (CLAUDE.md ships `--type SUBFLOW` on ~16 commands) instead of the derived
#    `--flow-type`, and gives the v1 spaced param "Flow Type" the same flag. ──
global_param_cli_names:
  flowType: "type"
  "Flow Type": "type"

# ── page-number pagination — fetch ALL pages by default; --page/--size fetch a
#    single page (design § 6, capability 6). item_key = response array wrapper. ─
pagination:
  findFlows: {page_param: page, size_param: size, item_key: flows}
  getPublishedFlowVersions: {page_param: page, size_param: size, item_key: versions}
  getAllFlowVersions: {page_param: page, size_param: size, item_key: versions}
  findAll_1: {page_param: page, size_param: size, item_key: templates}
  findAll: {page_param: page, size_param: size, item_key: projects}
  getInteractions: {page_param: currentPage, size_param: pageSize, item_key: interactions}

# ── item_key for non-paginated list commands rendered with a table. ─────────
response_list_keys:
  findAllConnectors: connectors
  getGlobalVariables: variables    # API envelope is {"variables": [...]} (found by Phase-C sweep)

# ── table columns (also marks the command as a list). Columns use only field
#    accessors verified live in Phase A (api sweep) or Phase 3 (hand commands). ─
table_columns:
  # hand FLOW_COLUMNS parity (list/search/check share it)
  findFlows: [["ID", "id"], ["Name", "name"], ["Status", "status"], ["Type", "flowType"], ["Updated", "lastModifiedDate"]]
  findFlows_1: [["ID", "id"], ["Name", "name"], ["Status", "status"], ["Type", "flowType"], ["Updated", "lastModifiedDate"]]
  getGlobalVariables: [["Name", "name"], ["Type", "type"], ["Value", "value"]]
  # Version ID (ObjectId) MUST lead — it is what `revert FLOW VERSION` / `version get`
  # consume; dropping it from the default table breaks the find-then-revert workflow.
  getPublishedFlowVersions: [["Version ID", "id"], ["Version", "version"], ["Tag", "tag"], ["Published", "publishedDate"], ["Created By", "createdBy"]]
  getAllFlowVersions: [["Version ID", "id"], ["Name", "name"], ["Version", "version"], ["Type", "flowType"], ["Created", "createdDate"]]
  findAll_1: [["ID", "id"], ["Name", "name"], ["Type", "flowType"], ["Description", "description"]]
  findAll: [["ID", "id"], ["Name", "name"], ["Default", "default"], ["Created By", "createdBy"]]
  findAllConnectors: [["ID", "id"], ["Name", "name"], ["Type", "type"]]
  getInteractions: [["Interaction ID", "interactionId"], ["Version", "flowVersionId"], ["ANI", "ani"], ["DNIS", "dnis"], ["Start", "startTime"], ["End", "endTime"]]

# ── success_echo (Phase-B polish): these ops return an EMPTY body, so a raw
#    print_json prints a bare `null`. Print the friendly confirmation instead
#    (the body is still printed if the server ever returns one). Placeholders
#    reference the emitted argument names. ──────────────────────────────────────
success_echo:
  lockFlow: "Locked flow {flow_id}"
  unlockFlow: "Unlocked flow {flow_id}"
  removeFlowById: "Deleted flow {flow_id}"
  revertFlowVersion: "Reverted flow {flow_id} to version {version_id}"
  # Phase C — mutations whose hand commands printed a friendly confirmation
  saveDraft: "Draft saved for flow {flow_id}"
  patchDraft: "Patched draft of flow {flow_id}"
  publishFlowVersion: "Published flow {flow_id}"
  updateFlowPreferences: "Preferences updated for flow {flow_id}"
  createFlowPreference: "Preferences added for flow {flow_id}"
  removeFlowPreferencesByPreferenceNames: "Removed preferences from flow {flow_id}"

# ── promote_to_argument (Phase-B polish): the verb's SUBJECT reads better as a
#    positional argument than behind a required flag — `revert FLOW VERSION`,
#    `copy SOURCE`, `variable-mapping CURRENT HANDOFF`. Still sent as query
#    params on the wire. ────────────────────────────────────────────────────────
promote_to_argument:
  copyFlow: ["sourceFlowId"]
  revertFlowVersion: ["versionId"]
  performFlowVariableAutoMapping: ["currentFlowId", "handOffFlowId"]
  # Phase C — documented positional subjects
  checkFlowNameUniqueness: ["flowName"]                  # unique-name NAME
  consumeFlowFromTemplate: ["templateName", "flowName"]  # consume-template TEMPLATE NAME

# ── expose_path_param (Phase-B polish): the connector-controller 404s on the
#    system-provisioned project, so the auto-injected projectId must be
#    overridable — `connector-list --project-id <user-project>`. ────────────────
expose_path_param:
  findAllConnectors: ["projectId"]
  getConnector: ["projectId"]
  # restore the hand `project [ID]` capability (query any project, not just the
  # configured one) as an overridable --project-id.
  findProject: ["projectId"]

# ── curated command names, keyed by operationId (stable — unlike derived names).
#    Every generated op gets an explicit, unique-within-group name. ───────────
command_names:
  # flows
  findFlowById: get
  findFlows: list
  performFlowVariableAutoMapping: variable-mapping
  checkFlowNameUniqueness: unique-name
  importFlowVersion_1: import
  copyFlow: copy
  consumeFlowFromJson: consume
  consumeFlowFromTemplate: consume-template
  unlockFlow: unlock
  revertFlowVersion: revert
  publishFlowVersion: publish
  lockFlow: lock
  findFlows_1: check
  exportFlowVersion_1: export
  getGlobalVariables: global-variables
  removeFlowById: delete
  mergePatchFlow: merge-patch
  # flows-v2
  dryRunValidate: validate
  importFlowVersion: import
  getDraft: get-draft
  saveDraft: save-draft
  patchDraft: patch-draft
  validateFlowVersionById: validate-id
  exportFlowVersion: export
  getActivityDefinitions: activities
  describeActivity: describe
  getChoicesForInput: choices
  # versions
  getPublishedFlowVersions: list
  getFlowVersionById: get
  getLatestFlowVersion: latest
  getLatestFlowDraftVersion: draft
  getAllFlowVersions: all
  findAllLatestFlowVersions: all-latest
  # tracing
  getInteraction: interaction
  getTraces: traces
  getTracesDecrypt: traces-decrypt
  getAnalytics: analytics
  getInteractions: interactions
  # prefs
  getFlowPreferences: list
  createFlowPreference: add
  updateFlowPreferences: set
  removeFlowPreferencesByPreferenceNames: remove
  getFlowTags: tags
  getTagHistories: tag-history
  # templates
  findById: get
  findAll_1: list
  # resource-collections
  getResourceCollectionsByUserProfile: list
  # connectors
  getConnector: get
  findAllConnectors: list
  # projects
  findProject: get
  findAll: list
  # user-prefs
  getUserPreferences: get
  # util
  testExpression: test-expr
  buildInfo: build-info
  health: health
  getCurrentUser: whoami

# ── top-level promotions (design § 5) — Phase B wave 1. Each generated command
#    is ALSO registered at the root app under its documented porcelain name; the
#    hand-written command of that name MUST be deleted (register() raises on a
#    live collision). Key = operationId, value = root command name. ────────────
top_level_commands:
  # Group 1 — read-only, print_json, output already identical to hand
  findFlowById: get
  getFlowPreferences: prefs
  getFlowTags: tags
  getTagHistories: tag-history
  getUserPreferences: user-prefs
  getResourceCollectionsByUserProfile: resource-collections
  # (health: the hand command bundled /health + /build_info; Phase-C decision (a)
  # split it into TWO promoted commands — `health` and `build-info` — see below.)
  getInteraction: interaction
  getAnalytics: analytics
  findProject: project
  # Group 2 — read-only lists with curated domain columns
  getPublishedFlowVersions: versions
  findAll_1: templates
  findAll: projects
  getInteractions: interactions
  # Group 3 — mutations (success_echo / promote_to_argument polish applied)
  lockFlow: lock
  unlockFlow: unlock
  removeFlowById: delete
  copyFlow: copy
  revertFlowVersion: revert
  performFlowVariableAutoMapping: variable-mapping
  # Connectors — with the --project-id override so they can reach a user project
  findAllConnectors: connector-list
  getConnector: connector
  # ── Phase C wave 2 ─────────────────────────────────────────────────────────
  # Simple reads
  getGlobalVariables: global-vars
  getActivityDefinitions: activities
  findFlows_1: check
  findFlows: list
  # File I/O
  getDraft: draft
  exportFlowVersion: export
  exportFlowVersion_1: export-ui
  findById: template-get
  # Body-from-file
  importFlowVersion: create
  saveDraft: save-draft
  patchDraft: patch
  updateFlowPreferences: prefs-set
  createFlowPreference: prefs-add
  # DELETE-with-body
  removeFlowPreferencesByPreferenceNames: prefs-rm
  # multipart
  importFlowVersion_1: import-ui
  # Single-feature transforms
  consumeFlowFromJson: consume
  consumeFlowFromTemplate: consume-template
  publishFlowVersion: publish
  checkFlowNameUniqueness: unique-name
  testExpression: test-expr
  # UX splits (dispatchers → per-op commands; docs updated in Phase D)
  dryRunValidate: validate
  validateFlowVersionById: validate-id
  getLatestFlowVersion: version-latest
  getLatestFlowDraftVersion: version-draft
  getFlowVersionById: version-by-id
  getTraces: traces
  getTracesDecrypt: traces-decrypt
  getAllFlowVersions: all-versions
  findAllLatestFlowVersions: all-versions-latest
  # UX behavior changes (accepted design § 14)
  getCurrentUser: whoami
  describeActivity: describe
  getChoicesForInput: choices
  # health decision (a): two clean commands — health AND build-info
  health: health
  buildInfo: build-info
  # (search + update promote via their extra_commands top_level keys)

# ── drift-gate excuse list: the 8 irreducible hand-written commands (design
#    § 14 + § 12) have no spec operation; the parity gate counts them as excused. ─
keep_endpoints:
  - "configure"     # local: save token + auto-resolve org
  - "set-project"   # local: set project id
  - "init"          # local: materialize bundled playbook
  - "template"      # local: bundled FlowIR starter template
  - "events"        # synthesis: mines eventsGenerated from the start activity (no event-spec endpoint)
  - "connectors"    # synthesis: aggregates two choices calls (connector-controller 404s on system project)
  - "schema"        # synthesis: builds a FlowIR node template client-side (no endpoint returns this)
  - "spec-diff"     # meta: diffs live /v3/api-docs vs specs/ snapshot (the api-docs endpoint is not a spec op)
