name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Playbook bundle freshness guard (Claude + generated Codex profile)
        run: |
          python wxcc-dist/assemble.py
          if [ -n "$(git status --porcelain -- src/wxcc_flow/_playbook)" ]; then
            git status --porcelain -- src/wxcc_flow/_playbook
            echo "::error::src/wxcc_flow/_playbook is stale (Claude + generated Codex profile) — run 'python wxcc-dist/assemble.py', review the diff, commit."
            exit 1
          fi

      - name: Test suite (pure-local, no API calls)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pyyaml
          python -m pytest -q

      - name: Drift gate (spec/CLI/docs parity)
        run: python tools/generator/drift_check.py --enforce

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Wheel playbook smoke (installed-package init check)
        run: python tools/wheel_playbook_smoke.py dist
