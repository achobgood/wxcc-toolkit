name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # OIDC for PyPI Trusted Publishing
      contents: write      # upload assets to the Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Playbook bundle freshness guard
        run: |
          python wxcc-dist/assemble.py
          if [ -n "$(git status --porcelain -- src/wxcc_flow/_playbook)" ]; then
            git status --porcelain -- src/wxcc_flow/_playbook
            echo "::error::src/wxcc_flow/_playbook is stale — run 'python wxcc-dist/assemble.py', review the diff, commit, re-tag."
            exit 1
          fi

      - name: Test suite (pure-local, no API calls)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pyyaml
          python -m pytest -q

      - name: Drift gate (spec/CLI/docs parity)
        run: python tools/generator/drift_check.py --enforce

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Version guard (tag must match built version)
        run: |
          TAG="${{ github.event.release.tag_name }}"
          EXPECTED="${TAG#v}"
          BUILT=$(ls dist/*.whl | sed -E 's#.*/wxcc_toolkit-([^-]+)-py3-none-any\.whl#\1#')
          echo "tag=$TAG expected=$EXPECTED built=$BUILT"
          if [ "$BUILT" != "$EXPECTED" ]; then
            echo "::error::Built version $BUILT != tag $EXPECTED"; exit 1
          fi
          case "$BUILT" in
            *.dev*|*+*) echo "::error::Dirty version $BUILT"; exit 1;;
          esac

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Attach artifacts to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*
